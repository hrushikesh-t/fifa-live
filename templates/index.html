<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FIFA Live — Football Intelligence</title>
  <meta name="description" content="Real-time football scores, stats, key events and live commentary across 10 major competitions." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<!-- ══════════════════════════════════════════════════════════
     HEADER
══════════════════════════════════════════════════════════ -->
<header class="site-header" role="banner">
  <div class="header-inner">

    <a class="brand" href="/" aria-label="FIFA Live Home">
      <svg class="brand-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <circle cx="12" cy="12" r="10.5" stroke="currentColor" stroke-width="1.4"/>
        <path d="M12 3.5C12 3.5 14.5 6 16.8 7.5C18.2 8.4 19.5 8.8 20 10C20.4 10.8 20.3 11.8 19.8 13C18.6 15.5 16 17 15 18.5C14 20 14 21.2 12.5 22C11.7 22.4 10.3 22.4 9.5 22C8 21.2 8 20 7 18.5C6 17 3.4 15.5 2.2 13C1.7 11.8 1.6 10.8 2 10C2.5 8.8 3.8 8.4 5.2 7.5C7.5 6 10 3.5 12 3.5Z" fill="currentColor" opacity="0.15"/>
        <circle cx="12" cy="11.5" r="2.8" fill="currentColor" opacity="0.9"/>
      </svg>
      <span class="brand-name">FIFA<span class="brand-accent">Live</span></span>
    </a>

    <!-- League tabs -->
    <nav class="league-rail" aria-label="Select competition">
      <div class="league-tabs" id="league-tabs" role="tablist"></div>
    </nav>

    <div class="header-actions">
      <div id="poll-badge" class="poll-badge hidden" aria-live="polite" aria-atomic="true">
        <span class="poll-dot" aria-hidden="true"></span>
        <span>Live</span>
      </div>
      <button id="refresh-btn" class="refresh-btn" aria-label="Refresh data">
        <svg id="spinner" class="icon-spin hidden" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.8"
                  stroke-dasharray="30" stroke-dashoffset="8" stroke-linecap="round"/>
        </svg>
        <svg id="refresh-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor"
             stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M13.5 2v4h-4M2.5 14v-4h4"/>
          <path d="M2.82 7A5.5 5.5 0 0 1 13.1 5.5L13.5 6M13.18 9A5.5 5.5 0 0 1 2.9 10.5L2.5 10"/>
        </svg>
        <span>Refresh</span>
      </button>
    </div>

  </div>
</header>

<!-- ══════════════════════════════════════════════════════════
     MAIN
══════════════════════════════════════════════════════════ -->
<main id="main" tabindex="-1">

  <!-- Error -->
  <div id="error-banner" class="error-banner hidden" role="alert" aria-live="assertive"></div>

  <!-- ── HERO SCORE ───────────────────────────────────────── -->
  <section id="hero-section" class="hero hidden" aria-label="Match score">
    <!-- Ambient team color glows -->
    <div class="hero-glow hero-glow-home" aria-hidden="true"></div>
    <div class="hero-glow hero-glow-away" aria-hidden="true"></div>

    <div class="hero-inner">
      <!-- Meta row -->
      <div class="hero-meta">
        <span id="live-chip" class="live-chip hidden" aria-label="Match is live">
          <span class="live-pulse" aria-hidden="true"></span>LIVE
        </span>
        <span id="hero-clock"  class="hero-clock"></span>
        <span id="hero-status" class="hero-status"></span>
        <span id="hero-league" class="hero-league-badge"></span>
      </div>

      <!-- Score row -->
      <div class="hero-score-row">
        <div class="hero-team home-team">
          <img id="home-logo" class="team-crest" src="" alt="" loading="lazy" aria-hidden="true" />
          <span id="home-name" class="team-label">—</span>
        </div>

        <div class="hero-digits">
          <span id="home-score" class="score-digit" aria-label="Home score">—</span>
          <span class="score-colon" aria-hidden="true">:</span>
          <span id="away-score" class="score-digit" aria-label="Away score">—</span>
        </div>

        <div class="hero-team away-team">
          <img id="away-logo" class="team-crest" src="" alt="" loading="lazy" aria-hidden="true" />
          <span id="away-name" class="team-label">—</span>
        </div>
      </div>

      <!-- Hero footer -->
      <div class="hero-footer">
        <span class="hero-source">Via ESPN</span>
        <span id="hero-updated" class="hero-updated"></span>
      </div>
    </div>
  </section>

  <!-- ── FIXTURE STRIP ────────────────────────────────────── -->
  <section class="fixture-strip-wrap" aria-label="Fixtures">
    <div class="fixture-strip-header">
      <span id="fixtures-league-name" class="strip-league-name"></span>
      <span id="fixtures-meta"        class="strip-meta"></span>
    </div>
    <div class="fixture-strip" id="fixture-strip" role="list">
      <!-- Skeleton -->
      <div class="fx-skel s-pulse" aria-hidden="true"></div>
      <div class="fx-skel s-pulse" aria-hidden="true"></div>
      <div class="fx-skel s-pulse" aria-hidden="true"></div>
      <div class="fx-skel s-pulse" aria-hidden="true"></div>
    </div>
  </section>

  <!-- ── MATCH DETAIL ──────────────────────────────────────── -->
  <div id="match-detail" class="match-detail hidden">

    <!-- Mobile tab bar -->
    <div class="tab-bar" role="tablist" aria-label="Match sections">
      <button class="tab-btn active" role="tab" aria-selected="true"
              aria-controls="stats-panel"   data-tab="stats">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"
             stroke-linecap="round" aria-hidden="true">
          <rect x="1" y="9"  width="4" height="6" rx="1"/>
          <rect x="6" y="5"  width="4" height="10" rx="1"/>
          <rect x="11" y="1" width="4" height="14" rx="1"/>
        </svg>
        Stats
      </button>
      <button class="tab-btn" role="tab" aria-selected="false"
              aria-controls="events-panel" data-tab="events">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"
             stroke-linecap="round" aria-hidden="true">
          <circle cx="8" cy="8" r="6.5"/>
          <path d="M8 5v3.5l2 2"/>
        </svg>
        Events
      </button>
      <button class="tab-btn" role="tab" aria-selected="false"
              aria-controls="commentary-panel" data-tab="commentary">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"
             stroke-linecap="round" aria-hidden="true">
          <path d="M14 2H2a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h3l3 2 3-2h3a1 1 0 0 0 1-1V3a1 1 0 0 0-1-1z"/>
        </svg>
        Live
        <span id="tab-count" class="tab-count hidden"></span>
      </button>
    </div>

    <!-- Panels -->
    <div class="panels-grid">

      <!-- Stats -->
      <section id="stats-panel" class="panel" role="tabpanel" aria-label="Match statistics">
        <div class="panel-head">
          <span class="panel-title">Match Stats</span>
          <div class="panel-teams-label">
            <span id="stat-home-abbr" class="stat-team-abbr home-abbr">HME</span>
            <span id="stat-away-abbr" class="stat-team-abbr away-abbr">AWY</span>
          </div>
        </div>
        <div id="stats-content" class="stats-content">
          <div class="panel-empty">Select a live match to see statistics.</div>
        </div>
      </section>

      <!-- Key Events -->
      <section id="events-panel" class="panel hidden-mobile" role="tabpanel" aria-label="Key events">
        <div class="panel-head">
          <span class="panel-title">Key Events</span>
        </div>
        <div id="events-content" class="events-content" aria-live="polite">
          <div class="panel-empty">Goals, cards and substitutions appear here.</div>
        </div>
      </section>

      <!-- Commentary -->
      <section id="commentary-panel" class="panel hidden-mobile" role="tabpanel" aria-label="Live commentary">
        <div class="panel-head">
          <span class="panel-title">Commentary</span>
          <span id="commentary-count" class="commentary-count"></span>
        </div>
        <div id="commentary-feed" class="commentary-feed" aria-live="polite"></div>
      </section>

    </div>
  </div>

</main>

<!-- ══════════════════════════════════════════════════════════
     TWEET MODAL
══════════════════════════════════════════════════════════ -->
<div id="tweet-modal" class="modal-overlay hidden"
     role="dialog" aria-modal="true" aria-labelledby="modal-heading">
  <div class="modal-card">
    <div class="modal-top">
      <h2 id="modal-heading" class="modal-heading">
        <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
          <path d="M15.2 2h2.76l-6.02 6.88 7.08 9.37H13.47l-3.93-5.19-4.5 5.19H2.3l6.44-7.37L1.05 2H7.4l3.55 4.69L15.2 2Zm-.97 14.6h1.53L5.9 3.53H4.25l10 13.07Z"/>
        </svg>
        Post to X
      </h2>
      <button class="modal-close" id="modal-close" aria-label="Close">
        <svg viewBox="0 0 14 14" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" aria-hidden="true">
          <path d="M1 1l12 12M13 1L1 13"/>
        </svg>
      </button>
    </div>

    <textarea id="tweet-text" class="tweet-textarea" maxlength="280" rows="5"
              aria-label="Tweet content" placeholder="What's happening in the match?"></textarea>

    <div class="modal-bottom">
      <div class="char-ring-wrap" aria-hidden="true">
        <svg viewBox="0 0 32 32" width="32" height="32">
          <circle cx="16" cy="16" r="13" fill="none" stroke="var(--bd2)" stroke-width="2.5"/>
          <circle id="char-ring" cx="16" cy="16" r="13" fill="none"
                  stroke="var(--c-blue)" stroke-width="2.5"
                  stroke-dasharray="81.7" stroke-dashoffset="0"
                  stroke-linecap="round" transform="rotate(-90 16 16)"/>
        </svg>
        <span id="char-count" class="char-num" aria-live="polite" aria-atomic="true">280</span>
      </div>
      <div class="modal-actions">
        <button class="btn-ghost" id="modal-cancel">Cancel</button>
        <button class="btn-post"  id="modal-post">
          <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <path d="M15.2 2h2.76l-6.02 6.88 7.08 9.37H13.47l-3.93-5.19-4.5 5.19H2.3l6.44-7.37L1.05 2H7.4l3.55 4.69L15.2 2Z"/>
          </svg>
          Post
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Toast for new goals -->
<div id="goal-toast" class="goal-toast hidden" role="status" aria-live="polite" aria-atomic="true"></div>

<script src="/static/app.js"></script>
</body>
</html>
